<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gerador de Laudo Técnico</title>
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <style>
    /* --- ESTILO GERAL E CORES --- */
    :root {
      --cor-primaria: #007bff;
      --cor-fundo: #8ad6cf;
      --cor-card: #ffffff;
      --cor-borda: #dee2e6;
      --cor-sombra: rgba(0, 0, 0, 0.1);
      --cor-texto: #495057;
      --cor-titulo: #212529;
    }

    body { 
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      margin: 0;
      padding: 20px;
      background-color: var(--cor-fundo);
      color: var(--cor-texto);
    }

    #loader-overlay {
      position: fixed; inset: 0; background: rgba(255,255,255,0.8);
      display: none; justify-content: center; align-items: center; z-index: 9999;
      flex-direction: column; font-weight: bold; color: var(--cor-primaria);
    }

    .form-section {
      border: 1px solid var(--cor-borda); padding: 20px; margin: 20px 0; 
      border-radius: 8px; background-color: var(--cor-card); box-shadow: 0 4px 8px var(--cor-sombra);
    }
    .form-group { margin-bottom: 15px; }
    .form-row { display: grid; grid-template-columns: 1fr 2fr; gap: 15px; }
    label, .form-group > span { display: block; font-weight: bold; margin-bottom: 5px; }
    input[type="text"], input[type="date"], input[type="time"], select, textarea {
      width: 100%; padding: 12px 15px; border-radius: 8px; border: 1px solid var(--cor-borda);
      font-size: 16px; box-sizing: border-box; transition: border-color 0.2s;
    }
    input[type="text"]:focus, select:focus, textarea:focus { border-color: var(--cor-primaria); outline: none; }
    textarea { resize: vertical; }

    .checkbox-group label { display: inline-flex; width: auto; margin-right: 20px; font-weight: normal; }

    #btnGerarLaudo {
      width: 100%; padding: 15px; font-size: 18px; background-color: #28a745;
      color: white; border: none; border-radius: 8px; cursor: pointer; transition: background-color 0.2s ease-in-out;
    }
    #btnGerarLaudo:hover { background-color: #218838; }

    /* CSS DA PEÇA E PLACEHOLDER */
    .peca-img { 
      width: 60px; height: 60px; margin-right: 15px; object-fit: cover; border-radius: 8px; 
      border: 1px solid var(--cor-borda); background: #fff; flex-shrink: 0;
    }
    .peca-img-placeholder { 
      width: 60px; height: 60px; margin-right: 15px; border-radius: 8px; border: 1px solid var(--cor-borda); 
      background: #f8f9fa; display: flex; align-items: center; justify-content: center; 
      font-size: 20px; font-weight: bold; color: #adb5bd; flex-shrink: 0; text-transform: uppercase;
    }

    #pecasLista label {
      display: flex; width: 100%; align-items: center; margin-bottom: 10px;
      padding: 10px; border-radius: 8px; border: 1px solid transparent; transition: all 0.2s ease-in-out;
    }
    #pecasLista label:hover { background-color: #f8f9fa; border-color: var(--cor-borda); }
    #pecasLista h4 { margin-top: 20px; margin-bottom: 15px; padding-bottom: 8px; border-bottom: 2px solid var(--cor-primaria); color: var(--cor-titulo); }
    
    .peca-item { display: grid; grid-template-columns: 1fr auto; gap: 15px; align-items: center; margin-bottom: 15px; }
    .opcoes-peca { display: none; align-items: center; gap: 20px; }

    .cor-selecao { display: flex; gap: 5px; border: 1px solid var(--cor-borda); padding: 5px; border-radius: 8px; background-color: #f8f9fa; }
    .cor-selecao label { font-weight: normal; cursor: pointer; padding: 5px 10px; border-radius: 4px; border: 1px solid transparent; transition: all 0.2s; }
    .cor-selecao label:hover { background-color: #e9ecef; }
    .cor-selecao input[value="verde"]:checked + label { background-color: #d4edda; color: #155724; border-color: #b1dfbb; font-weight: bold; }
    .cor-selecao input[value="azul"]:checked + label { background-color: #cce5ff; color: #004085; border-color: #b8daff; font-weight: bold; }
    .cor-selecao input[value="rosa"]:checked + label { background-color: #ebacdd; color: #ed3cc5; border-color: #f5c6cb; font-weight: bold; }
    .cor-selecao input[type="radio"] { display: none; }

    .quantidade-label { display: flex; align-items: center; gap: 8px; font-weight: normal; }
    .quantidade-input { width: 40px; padding: 8px; text-align: center; }
    .peca-info-texto { display: flex; flex-direction: column; gap: 6px; }

    .estoque-badge {
      display: inline-flex; align-items: center; width: fit-content; padding: 4px 8px;
      border-radius: 999px; font-size: 13px; font-weight: bold; border: 1px solid var(--cor-borda);
      background-color: #eef2f7; color: #334155;
    }
    .peca-item.estoque-baixo .estoque-badge { background-color: #fff3cd; border-color: #ffecb5; color: #664d03; }
    .peca-item.estoque-zerado .estoque-badge { background-color: #f8d7da; border-color: #f5c2c7; color: #842029; }
    .peca-item.estoque-zerado .peca-info, .peca-item.estoque-baixo .peca-info { border-color: currentColor; }

    #previewFotos { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 10px; }
    .preview-img { width: 150px; height: 150px; object-fit: cover; border-radius: 8px; border: 1px solid var(--cor-borda); }
    .hidden { display: none; }
  

    /* ============================================================
       VISUAL ATUALIZADO 
    ============================================================ */
    :root {
      --navy-950: #071a33;
      --navy-900: #0b2d52;
      --navy-800: #0f3a68;
      --blue-500: #1d6fb8;
      --blue-400: #3b8bd4;
      --page-dark: #1b1f20;
      --card-dark: #171b1c;
      --card-border: rgba(59, 139, 212, 0.22);
      --field-dark: #1b1f20;
      --field-border: #2b4260;
      --field-focus: #20272b;
      --text-main: #f3f6fb;
      --text-soft: #c4c7cc;
      --text-muted: #9aa3ad;
      --success: #188643;
      --success-dark: #137238;
      --disabled-1: #59616c;
      --disabled-2: #454b55;
      --font-ui: "Inter", "Segoe UI", Arial, sans-serif;
      --font-display: "Manrope", "Inter", "Segoe UI", Arial, sans-serif;
    }

    body {
      margin: 0 !important;
      min-height: 100vh;
      padding: 0 0 64px !important;
      background:
        radial-gradient(900px 380px at 50% -130px, rgba(59,139,212,0.18), transparent 72%),
        linear-gradient(180deg,
          #071a33 0%,
          #0a2545 16%,
          #0d3158 29%,
          #123a61 39%,
          #173752 50%,
          #1a2e3d 61%,
          #1b262d 72%,
          #1b1f20 86%,
          #1b1f20 100%) !important;
      background-attachment: fixed;
      color: var(--text-main) !important;
      font-family: var(--font-ui) !important;
      -webkit-font-smoothing: antialiased;
    }

    .topbar {
      position: relative;
      z-index: 1;
      padding: 34px 24px 82px;
      background: transparent;
      box-shadow: none;
      overflow: visible;
    }

    .topbar-inner {
      width: min(1080px, 100%);
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
    }

    .topbar h1 {
      margin: 0;
      color: #f5f8fc;
      font-family: var(--font-display);
      font-size: clamp(26px, 3vw, 34px);
      font-weight: 800;
      letter-spacing: -0.6px;
      line-height: 1.1;
    }

    #laudoForm {
      width: min(880px, calc(100% - 32px));
      margin: -38px auto 0;
      position: relative;
      z-index: 2;
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    .form-section {
      width: 100%;
      margin: 0 !important;
      padding: 26px 28px 28px !important;
      background: var(--card-dark) !important;
      border: 1px solid var(--card-border) !important;
      border-radius: 18px !important;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.18) !important;
      color: var(--text-main) !important;
      overflow: visible;
    }

    .form-section h2 {
      margin: 0 0 20px !important;
      padding-bottom: 14px;
      border-bottom: 1px solid rgba(59, 139, 212, 0.22);
      color: var(--text-main) !important;
      font-family: var(--font-display);
      font-size: 18px !important;
      font-weight: 800 !important;
      letter-spacing: -0.2px;
    }
    
    .form-section h3 {
      font-family: var(--font-display);
      font-size: 15px;
      font-weight: 800;
      color: var(--blue-400);
      margin: 25px 0 15px 0;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--field-border);
    }

    .form-group { margin-bottom: 15px !important; }

    .form-row {
      display: grid !important;
      grid-template-columns: 1fr 1.4fr !important;
      gap: 18px !important;
    }

    label, .form-group > span {
      display: block;
      margin-bottom: 7px !important;
      color: var(--text-soft) !important;
      font-size: 13px !important;
      font-weight: 700 !important;
      letter-spacing: 0.1px;
    }

    input[type="text"], input[type="date"], input[type="time"], input[type="number"], select, textarea {
      width: 100% !important; min-height: 44px; padding: 11px 14px !important;
      border: 1.5px solid var(--field-border) !important; border-radius: 8px !important; outline: none !important;
      background-color: var(--field-dark) !important; color: var(--text-main) !important;
      font-family: var(--font-ui) !important; font-size: 14.5px !important; box-shadow: 0 1px 2px rgba(0,0,0,0.12) !important;
      transition: border-color 0.15s ease, background 0.15s ease, box-shadow 0.15s ease !important;
    }

    input[readonly] { background-color: #20252a !important; color: #aeb7c1 !important; cursor: not-allowed !important; }
    textarea { min-height: 108px; resize: vertical; line-height: 1.55; }

    input:focus, select:focus, textarea:focus {
      background-color: var(--field-focus) !important; border-color: var(--blue-400) !important;
      box-shadow: 0 0 0 4px rgba(59,139,212,0.14) !important;
    }

    input::placeholder, textarea::placeholder { color: #737b83 !important; }

    select {
      appearance: none !important; -webkit-appearance: none !important; -moz-appearance: none !important;
      padding-left: 14px !important; padding-right: 44px !important;
      background-image: linear-gradient(45deg, transparent 50%, #8fa3bd 50%), linear-gradient(135deg, #8fa3bd 50%, transparent 50%) !important;
      background-position: calc(100% - 22px) 50%, calc(100% - 15px) 50% !important;
      background-size: 7px 7px, 7px 7px !important; background-repeat: no-repeat !important;
    }
    select::-ms-expand { display: none; }
    select:focus { background-image: linear-gradient(45deg, transparent 50%, #3b8bd4 50%), linear-gradient(135deg, #3b8bd4 50%, transparent 50%) !important; }

    .checkbox-group { display: flex; flex-wrap: wrap; gap: 9px; margin-top: 4px; }
    .checkbox-group label {
      display: inline-flex !important; align-items: center; gap: 9px; width: auto !important; margin: 0 !important;
      padding: 9px 15px 9px 11px !important; background: #20252a !important; border: 1.5px solid var(--field-border) !important;
      border-radius: 999px !important; box-shadow: none !important; font-size: 13px !important; font-weight: 700 !important;
      color: var(--text-soft) !important; white-space: nowrap; cursor: pointer; transition: border-color 0.14s ease, background 0.14s ease, color 0.14s ease;
    }
    .checkbox-group label:hover { border-color: var(--blue-400) !important; color: #fff !important; background: #232c33 !important; }

    input[type="checkbox"] {
      appearance: none; -webkit-appearance: none; width: 18px; height: 18px; margin: 0; border-radius: 5px; background: #0f1417;
      border: 1.6px solid #46576b; position: relative; cursor: pointer; flex-shrink: 0; transition: all 0.14s ease;
    }
    input[type="checkbox"]:checked { background: var(--blue-500); border-color: var(--blue-400); }
    input[type="checkbox"]:checked::after { content: ""; position: absolute; top: 3px; left: 6px; width: 4px; height: 8px; border: solid #fff; border-width: 0 2px 2px 0; transform: rotate(45deg); }

    /* Componentes Dinâmicos (Grid Trocador) */
    .grid-parametros {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
        gap: 12px;
        background: rgba(0, 0, 0, 0.15);
        padding: 16px;
        border-radius: 12px;
        border: 1px solid var(--field-border);
        margin-bottom: 15px;
    }
    .grid-parametros .form-group { margin-bottom: 0 !important; }
    .grid-parametros label { font-size: 11px !important; }
    .grid-parametros input { min-height: 38px !important; font-size: 13.5px !important; }

    #pecasLista { display: grid !important; grid-template-columns: repeat(auto-fit, minmax(230px, 1fr)) !important; gap: 16px !important; margin-top: 4px; }
    #pecasLista h4 { grid-column: 1 / -1; margin: 10px 0 0 !important; padding: 0 0 8px !important; border-bottom: 1px solid rgba(59,139,212,0.22) !important; color: #8fb8e6 !important; font-size: 12.5px !important; font-weight: 800 !important; letter-spacing: 0.6px; text-transform: uppercase; }

    .peca-item { display: flex !important; flex-direction: column; justify-content: flex-start; gap: 10px !important; min-height: 220px !important; padding: 14px !important; margin: 0 !important; background: #20252a !important; border: 1.5px solid rgba(59,139,212,0.18) !important; border-radius: 12px !important; box-shadow: none !important; transition: border-color 0.15s ease, box-shadow 0.15s ease, background 0.15s ease; }
    .peca-item:hover { background: #232a30 !important; border-color: rgba(59,139,212,0.34) !important; }
    .peca-item.estoque-baixo { border-color: #e8a020 !important; }
    .peca-item.estoque-zerado { border-color: #d64545 !important; }
    #pecasLista label { border: 0 !important; padding: 0 !important; margin: 0 !important; background: transparent !important; }

    .peca-info { display: flex !important; flex-direction: column; align-items: flex-start; gap: 10px !important; width: 100%; font-size: 13.5px !important; font-weight: 700; color: var(--text-main) !important; }
    .peca-info input[type="checkbox"] { align-self: flex-end; }
    .peca-img, .peca-img-placeholder { width: 100% !important; height: 118px !important; margin: 0 !important; object-fit: contain !important; border-radius: 8px !important; background: #fff !important; border: 1px solid rgba(255,255,255,0.10) !important; padding: 8px !important; }
    .peca-img { cursor: zoom-in; }
    .peca-img-placeholder { display: flex !important; align-items: center; justify-content: center; color: #5b6b82 !important; font-size: 30px !important; font-weight: 800 !important; }
    .peca-info-texto { display: flex; flex-direction: column; gap: 7px; color: var(--text-main); }
    .estoque-badge { display: inline-flex; align-items: center; width: fit-content; padding: 4px 8px; border-radius: 999px; font-size: 12px; font-weight: 800; border: 1px solid rgba(255,255,255,0.10); background-color: #26323d; color: #c8d2de; }
    .peca-item.estoque-baixo .estoque-badge { background-color: rgba(232,160,32,0.18); border-color: rgba(232,160,32,0.45); color: #ffd98a; }
    .peca-item.estoque-zerado .estoque-badge { background-color: rgba(214,69,69,0.18); border-color: rgba(214,69,69,0.45); color: #ff9b9b; }

    .opcoes-peca { display: none; align-items: center; justify-content: space-between; gap: 10px; width: 100%; margin-top: auto; padding-top: 8px; border-top: 1px dashed rgba(255,255,255,0.14); }
    .quantidade-label { display: inline-flex !important; align-items: center; gap: 8px; color: var(--text-soft) !important; font-size: 12px !important; font-weight: 700 !important; white-space: nowrap; }
    .quantidade-input { width: 52px !important; min-height: 32px !important; padding: 5px 7px !important; text-align: center; font-size: 13px !important; }
    .cor-selecao { display: flex; gap: 6px; border: 0 !important; padding: 0 !important; background: transparent !important; }
    .cor-selecao input[type="radio"] { display: none; }
    .cor-selecao label { display: inline-flex !important; align-items: center; justify-content: center; width: 24px !important; height: 24px !important; margin: 0 !important; padding: 0 !important; border: 2px solid #fff !important; outline: 1.5px solid #52606e; border-radius: 50% !important; font-size: 0 !important; cursor: pointer; box-shadow: none !important; }
    .cor-selecao label[for*="_v_"] { background: #21b92d !important; }
    .cor-selecao label[for*="_a_"] { background: #205fe1 !important; }
    .cor-selecao label[for*="_r_"] { background: #ff00ff !important; }
    .cor-selecao input:checked + label { outline-color: #8fb8e6; outline-width: 2px; transform: scale(1.10); }

    #previewFotos { display: grid !important; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)) !important; gap: 12px !important; margin-top: 14px !important; }
    .preview-img { width: 100% !important; height: 120px !important; object-fit: cover !important; border-radius: 10px !important; background: #20252a !important; border: 1px solid rgba(59,139,212,0.22) !important; }
    input[type="file"] { width: 100%; min-height: 44px; padding: 11px 14px; border-radius: 8px; border: 1.5px dashed var(--field-border); background: #20252a; color: var(--text-soft); cursor: pointer; }

    #btnGerarLaudo { width: min(280px, 100%) !important; align-self: flex-end; display: inline-flex; align-items: center; justify-content: center; min-height: 54px; padding: 14px 28px !important; border: 0 !important; border-radius: 12px !important; background: linear-gradient(135deg, var(--success), var(--success-dark)) !important; color: #fff !important; font-family: var(--font-display); font-size: 15.5px !important; font-weight: 800 !important; cursor: pointer; box-shadow: 0 10px 24px rgba(31,157,85,0.28) !important; transition: box-shadow 0.15s ease, filter 0.15s ease !important; }
    #btnGerarLaudo:hover { filter: brightness(1.03); box-shadow: 0 14px 30px rgba(31,157,85,0.34) !important; }
    #btnGerarLaudo.btn-disabled { background: linear-gradient(135deg, var(--disabled-1), var(--disabled-2)) !important; color: #c9d0d8 !important; box-shadow: none !important; cursor: not-allowed !important; opacity: 0.92; }
    #loader-overlay { background: rgba(7, 26, 51, 0.82) !important; color: #8fb8e6 !important; backdrop-filter: blur(5px); }
    .hidden { display: none !important; }

    .image-lightbox { position: fixed; inset: 0; display: none; align-items: center; justify-content: center; padding: 28px; background: rgba(0, 0, 0, 0.78); backdrop-filter: blur(6px); z-index: 99999; }
    .image-lightbox.show { display: flex; }
    .image-lightbox-content { position: relative; width: min(920px, 96vw); max-height: 92vh; display: flex; flex-direction: column; gap: 12px; align-items: center; }
    .image-lightbox img { max-width: 100%; max-height: 78vh; object-fit: contain; border-radius: 16px; background: #ffffff; padding: 14px; }
    .image-lightbox-title { max-width: 100%; color: #ffffff; font-family: var(--font-display); font-size: 16px; font-weight: 700; text-align: center; }
    .image-lightbox-close { position: absolute; top: -14px; right: -14px; width: 42px; height: 42px; border: 0; border-radius: 50%; background: #ffffff; color: #111827; font-size: 25px; line-height: 1; font-weight: 700; cursor: pointer; display: inline-flex; align-items: center; justify-content: center; }

    @media (max-width: 860px) { #laudoForm { margin-top: -26px; } .form-row { grid-template-columns: 1fr !important; } #btnGerarLaudo { width: 100% !important; } }
    @media (max-width: 560px) { .topbar { padding: 24px 16px 58px; } #laudoForm { width: min(100% - 24px, 880px); margin-top: -18px; } #pecasLista { grid-template-columns: 1fr !important; } .grid-parametros { grid-template-columns: 1fr 1fr; } }

    .theme-toggle-btn { position: fixed !important; left: 18px !important; bottom: 18px !important; width: 48px !important; height: 48px !important; border-radius: 50% !important; justify-content: center !important; align-items: center !important; z-index: 9998 !important; background: rgba(255,255,255,0.10) !important; border: 1px solid rgba(255,255,255,0.22) !important; backdrop-filter: blur(10px); }
    .theme-toggle-btn .theme-label { display: none !important; }
    .theme-toggle-btn .theme-icon { font-size: 22px !important; }
    body.light-mode { background: radial-gradient(900px 380px at 50% -130px, rgba(29,111,184,0.16), transparent 72%), linear-gradient(180deg, #eaf3ff 0%, #edf5ff 22%, #eef1f6 44%, #eef1f6 100%) !important; color: #16202f !important; }
    body.light-mode .form-section { background: #ffffff !important; border-color: #e8ecf3 !important; color: #16202f !important; box-shadow: 0 10px 30px rgba(15,30,60,0.08) !important; }
    body.light-mode .form-section h2, body.light-mode .form-section h3, body.light-mode label, body.light-mode .form-group > span { color: #16202f !important; }
    body.light-mode input[type="text"], body.light-mode input[type="date"], body.light-mode input[type="time"], body.light-mode input[type="number"], body.light-mode select, body.light-mode textarea { background-color: #f1f4f9 !important; border-color: #dce2ec !important; color: #16202f !important; }
    body.light-mode .peca-item { background: #f6f8fb !important; border-color: #e8ecf3 !important; color: #16202f !important; }
    body.light-mode .checkbox-group label { background: #f6f8fb !important; border-color: #dce2ec !important; color: #5b6b82 !important; }
    body.light-mode .theme-toggle-btn { background: rgba(11,45,82,0.10) !important; border-color: rgba(11,45,82,0.20) !important; }
    body.light-mode .grid-parametros { background: #f8f9fa; border-color: #dce2ec; }
  </style>
</head>
<body>
  
  <div id="loader-overlay">
      <svg width="40" height="40" viewBox="0 0 50 50" style="margin-bottom:10px;">
          <circle cx="25" cy="25" r="20" fill="none" stroke="currentColor" stroke-width="4" stroke-dasharray="31.4 31.4" stroke-linecap="round">
              <animateTransform attributeName="transform" type="rotate" repeatCount="indefinite" dur="1s" keyTimes="0;1" values="0 25 25;360 25 25"></animateTransform>
          </circle>
      </svg>
      Sincronizando dados ao vivo com a Planilha...
  </div>

  <div class="topbar">
    <div class="topbar-inner topbar-simple">
      <h1>Gerador de relatório</h1>
      <button type="button" class="theme-toggle-btn" id="themeToggleBtn" aria-label="Alternar modo claro e noturno">
        <span class="theme-icon">☀️</span>

const GOOGLE_WEBAPP_URL = 'https://script.google.com/macros/s/AKfycbyWLWRFdlvnVzqkTyv50c5EBpvNstXESOrC4lu5r_P9cHWBCCHfQh4Q_MeBMNzW5mQe/exec';
const LIMITE_ESTOQUE_BAIXO = 2;
let estoquePorProduto = {}; let nomesPorProduto = {}; let codigosPorNomeProduto = {}; let estoqueCarregado = false;

function normalizarTextoChave(texto) { return String(texto || '').normalize('NFD').replace(/[̀-ͯ]/g, '').replace(/\s+/g, ' ').trim().toUpperCase(); }
function obterVariacoesCodigo(codigo) { const codigoLimpo = String(codigo || '').trim(); if (!codigoLimpo) return []; const semZeros = codigoLimpo.replace(/^0+/, '') || codigoLimpo; const comZeros = codigoLimpo.padStart(6, '0'); return [...new Set([codigoLimpo, semZeros, comZeros])]; }
function obterNomeProdutoPorCodigo(codigo) { for (const variacao of obterVariacoesCodigo(codigo)) { if (Object.prototype.hasOwnProperty.call(nomesPorProduto, variacao)) return nomesPorProduto[variacao]; } return null; }
function reconstruirIndiceCodigosPorNome() { codigosPorNomeProduto = {}; Object.entries(nomesPorProduto || {}).forEach(([codigo, nome]) => { const chave = normalizarTextoChave(nome); if (chave && !codigosPorNomeProduto[chave]) codigosPorNomeProduto[chave] = String(codigo).trim(); }); }

function resolverComponentePeloBanco(peca) {
    const codigoPlanilha = String(peca.codigo || '').trim(); const nomePlanilha = String(peca.nome || peca.descricao || peca.componente || '').trim();
    if (!codigoPlanilha && normalizarTextoChave(nomePlanilha).includes('SEM ANOMALIA')) return { codigo: '', nome: nomePlanilha || 'Sem anomalia' };
    const nomeOficialPorCodigo = obterNomeProdutoPorCodigo(codigoPlanilha);
    if (codigoPlanilha && nomeOficialPorCodigo) return { codigo: codigoPlanilha, nome: nomeOficialPorCodigo };
    const chaveNome = normalizarTextoChave(nomePlanilha);
    if (chaveNome && codigosPorNomeProduto[chaveNome]) return { codigo: codigosPorNomeProduto[chaveNome], nome: obterNomeProdutoPorCodigo(codigosPorNomeProduto[chaveNome]) || nomePlanilha };
    if (chaveNome) {
        const encontrado = Object.entries(nomesPorProduto || {}).find(([, nomeBanco]) => { const chaveBanco = normalizarTextoChave(nomeBanco); return chaveBanco && (chaveBanco.includes(chaveNome) || chaveNome.includes(chaveBanco)); });
        if (encontrado) return { codigo: String(encontrado[0]).trim(), nome: encontrado[1] };
    }
    return { codigo: codigoPlanilha, nome: nomePlanilha || obterNomeProdutoPorCodigo(codigoPlanilha) || 'Componente não identificado no banco' };
}

document.addEventListener('DOMContentLoaded', () => {
    const loader = document.getElementById('loader-overlay'); loader.style.display = 'flex';
    Promise.all([ fetch(`${GOOGLE_WEBAPP_URL}?action=getEstoque`).then(res => res.json()), fetchAgendamentoSeExistir() ])
    .then(([dadosEstoque, dadosAgendamento]) => {
        if (dadosEstoque && !dadosEstoque.error) { estoquePorProduto = dadosEstoque.estoque || {}; nomesPorProduto = dadosEstoque.nomes || {}; reconstruirIndiceCodigosPorNome(); estoqueCarregado = true; }
        if (dadosAgendamento) { preencherDadosAgendamento(dadosAgendamento); } else { document.getElementById('ra').readOnly = false; document.getElementById('ra').style.background = '#fff'; document.getElementById('ra').style.cursor = 'text'; }
    }).catch(err => { console.error('Erro:', err); alert('Falha ao sincronizar.'); }).finally(() => { loader.style.display = 'none'; });
});

function fetchAgendamentoSeExistir() {
    const urlParams = new URLSearchParams(window.location.search); const agendamento = urlParams.get('agendamento'); const codigo = urlParams.get('codigo'); 
    if (!agendamento) return Promise.resolve(null);
    document.getElementById('ra').value = agendamento;
    let url = `${GOOGLE_WEBAPP_URL}?action=getAgendamento&agendamento=${agendamento}`; if (codigo) url += `&codigo=${encodeURIComponent(codigo)}`;
    return fetch(url).then(res => res.json());
}

function preencherDadosAgendamento(data) {
    if (data.cliente) document.getElementById('cliente').value = data.cliente; if (data.defeito) document.getElementById('defeitoRelatado').value = data.defeito;
    if (data.dataEntrada) { try { let d = new Date(data.dataEntrada); if(!isNaN(d)) document.getElementById('dataEntrada').value = d.toISOString().split('T')[0]; } catch(e) {} }
    if (data.horarioEntrada) { try { let timeStr = data.horarioEntrada; document.getElementById('horaEntrada').value = timeStr.includes('T') ? new Date(timeStr).toISOString().substring(11, 16) : timeStr.substring(0, 5); } catch(e) {} }
    if (data.codigoEquipamento) { document.getElementById('codigoMaquina').value = data.codigoEquipamento; document.getElementById('codigoMaquina').dispatchEvent(new Event('input')); }
}

let timeoutBusca = null;
document.getElementById('codigoMaquina').addEventListener('input', function() {
    clearTimeout(timeoutBusca); const codigo = this.value.trim();
    if (!codigo) {
        document.getElementById('nomeMaquina').value = ''; document.getElementById('pecasBox').classList.add('hidden'); 
        document.getElementById("selecaoServico").innerHTML = '<option value="">-- O equipamento ainda não foi identificado --</option>';
        document.getElementById("selecaoServico").disabled = true;
        document.getElementById("containerDinamicoSeries").innerHTML = ''; document.getElementById("grupoAcessorios").classList.add('hidden'); document.getElementById("containerCamposExtra").innerHTML = ''; return;
    }
    const nomeEncontrado = obterNomeProdutoPorCodigo(codigo);
    if (nomeEncontrado) {
        document.getElementById('nomeMaquina').value = nomeEncontrado; renderizarCamposDinamicos(nomeEncontrado);
        timeoutBusca = setTimeout(() => { carregarPecasDinamicamente(codigo, nomeEncontrado); }, 500);
    } else {
        document.getElementById('nomeMaquina').value = 'Equipamento não localizado no DataShock'; document.getElementById('pecasBox').classList.add('hidden');
        document.getElementById("selecaoServico").innerHTML = '<option value="">-- O equipamento ainda não foi identificado --</option>';
        document.getElementById("selecaoServico").disabled = true; document.getElementById("containerDinamicoSeries").innerHTML = ''; document.getElementById("grupoAcessorios").classList.add('hidden'); document.getElementById("containerCamposExtra").innerHTML = '';
    }
});

function carregarPecasDinamicamente(codigoEquipamento, nomeEquipamento) {
  const pecasBox = document.getElementById("pecasBox"); const lista = document.getElementById("pecasLista"); 
  pecasBox.classList.remove("hidden"); lista.innerHTML = "<p style='color: var(--cor-primaria); font-weight:bold;'>Conectando ao banco de peças (Planilha 2)...</p>";

  fetch(`${GOOGLE_WEBAPP_URL}?action=getPecas&codigoEquip=${encodeURIComponent(codigoEquipamento)}`)
    .then(res => res.json())
    .then(data => {
        lista.innerHTML = "";
        if (data.erro) { lista.innerHTML = `<p style='color:red;'>Nenhuma lista de peças vinculada à aba "${codigoEquipamento}".</p>`; } 
        else if (data.pecas && data.pecas.length > 0) {
            lista.innerHTML = `<h4>Componentes Disponíveis</h4>`;
            data.pecas.forEach(peca => { const componente = resolverComponentePeloBanco(peca); lista.innerHTML += criarHtmlPeca(componente.codigo, componente.nome, codigoEquipamento); });
            aplicarEstoqueNasPecas();
        } else { lista.innerHTML = `<p>Aba vazia.</p>`; }
    }).catch(err => { console.error(err); lista.innerHTML = "<p style='color:red;'>Erro ao puxar componentes da planilha.</p>"; });
}

function formatarQuantidadeEstoque(valor) { if (valor === null || valor === undefined) return 'N/I'; return Number(valor).toLocaleString('pt-BR', { maximumFractionDigits: 2 }); }
function obterEstoqueProduto(codigo) { const codigoNormalizado = String(codigo || '').trim(); if (!codigoNormalizado || !estoqueCarregado) return null; if (Object.prototype.hasOwnProperty.call(estoquePorProduto, codigoNormalizado)) return estoquePorProduto[codigoNormalizado]; return 0; }
function classeEstoque(quantidade) { if (quantidade === null || quantidade === undefined) return ''; if (quantidade <= 0) return 'estoque-zerado'; if (quantidade <= LIMITE_ESTOQUE_BAIXO) return 'estoque-baixo'; return ''; }
function textoEstoque(quantidade) { if (quantidade === null || quantidade === undefined) return 'Estoque: N/I'; return `Estoque: ${formatarQuantidadeEstoque(quantidade)}`; }

function aplicarEstoqueNasPecas() {
    document.querySelectorAll('.peca-item').forEach(item => {
        const checkbox = item.querySelector('input[type="checkbox"]'); const badge = item.querySelector('.estoque-badge'); if (!checkbox || !badge) return;
        item.classList.remove('estoque-baixo', 'estoque-zerado'); const estoque = obterEstoqueProduto(checkbox.value);
        checkbox.dataset.estoque = estoque === null ? '' : String(estoque); badge.textContent = textoEstoque(estoque); const classe = classeEstoque(estoque); if (classe) item.classList.add(classe);
    });
}

function criarHtmlPeca(codigo, nomePeca, codigoEquipamento) {
    const estoque = obterEstoqueProduto(codigo); const estoqueClasse = classeEstoque(estoque); const estoqueValor = estoque === null ? '' : String(estoque); const letra = nomePeca ? nomePeca.charAt(0).toUpperCase() : '?';
    const codEqSanitizado = encodeURIComponent(String(codigoEquipamento).trim()); const codPecaSanitizado = encodeURIComponent(String(codigo).trim());

          <script>
            const laudoDataParaEnvio = ${JSON.stringify(laudoData)};
            const GOOGLE_WEBAPP_URL = 'https://script.google.com/macros/s/AKfycbzCfu6XW3hI3uuKaQj5DCCDKxDlsW1IdRketmDlWtcv8sE8KF1wk28VAmHwm1IsMbxY/exec';

            // --- CONFIGURAÇÃO DO TRELLO ---
            const TRELLO_CONFIG = {
              KEY: '0415bbec29847408d11cffc4ce584011',

              BOARD_ID: '6a47f1be7f248da154beeebb'
            };

            function salvarNaPlanilha() {
              const stringSéries = laudoDataParaEnvio.series.map(s => s.label + ': ' + s.valor).join(' | ');

              let anexosTecnicosStr = '';
              if (laudoDataParaEnvio.camposExtras && laudoDataParaEnvio.camposExtras.length > 0) {
                  anexosTecnicosStr = '\\n\\n--- PARÂMETROS AVANÇADOS ---\\n' + laudoDataParaEnvio.camposExtras.map(e => e.label + ': ' + e.valor.replace(/\\n/g, ', ')).join('\\n');
              }

              const payload = {
                ra: laudoDataParaEnvio.ra, cliente: laudoDataParaEnvio.cliente, equipamento: laudoDataParaEnvio.equipamento,
                dataEntrada: laudoDataParaEnvio.dataEntrada, horaEntrada: laudoDataParaEnvio.horaEntrada, acessorios: laudoDataParaEnvio.acessorios,
                registroDeSeries: stringSéries,
                tempoAnalise: laudoDataParaEnvio.servico.codigo + " - " + laudoDataParaEnvio.servico.nivel,
                garantia: laudoDataParaEnvio.garantia,
                defeitoRelatado: laudoDataParaEnvio.defeitoRelatado.replace(/<br>/g, "\\n"),
                obsTecnicas: laudoDataParaEnvio.obsTecnicas.replace(/<br>/g, "\\n") + anexosTecnicosStr,
                obsGerais: laudoDataParaEnvio.obsGerais.replace(/<br>/g, "\\n"),
                pecasSelecionadas: laudoDataParaEnvio.pecasSelecionadas
              };

              return fetch(GOOGLE_WEBAPP_URL, { method: 'POST', headers: { 'Content-Type': 'text/plain' }, body: JSON.stringify(payload) })
              .then(r => r.text())
              .then(txt => {
                try {
                  const res = JSON.parse(txt);
                  if (!res.ok) {
                    throw new Error(res.error || 'Erro desconhecido ao salvar na planilha');
                  }
                } catch (e) {}
              });
            }

            function gerarNomeArquivoPdf() {
              const limpar = (txt) => (txt || '').toString().trim().replace(/[^a-zA-Z0-9-_]+/g, '_');
              return 'Laudo_' + limpar(laudoDataParaEnvio.ra) + '_' + limpar(laudoDataParaEnvio.cliente) + '.pdf';
            }

            function esperarImagensCarregarem(elemento) {
              const imgs = Array.from(elemento.querySelectorAll('img'));
              return Promise.all(imgs.map(img => {
                if (img.complete && img.naturalWidth > 0) return Promise.resolve();
                return new Promise(resolve => {
                  img.addEventListener('load', resolve);
                  img.addEventListener('error', resolve);
                  setTimeout(resolve, 5000); 
                });
              }));
            }

            async function gerarPdfBlob() {
              const elemento = document.querySelector('.container');
              await esperarImagensCarregarem(elemento);
              
              const botoes = document.querySelector('.button-container');
              if (botoes) botoes.style.display = 'none';

              const { jsPDF } = window.jspdf;
              // Ajustes rígidos no jsPDF html() para bater com as dimensões do container exato
              const doc = new jsPDF({ unit: 'pt', format: 'a4', orientation: 'portrait' });
              
              return new Promise((resolve, reject) => {
                doc.html(elemento, {
                  callback: function (pdf) {
                    if (botoes) botoes.style.display = 'block';
                    resolve(pdf.output('blob'));
                  },
                  margin: [30, 30, 30, 30],
                  autoPaging: 'text',
                  width: 535, // Largura útil A4
                  windowWidth: 800 // Largura engessada correspondente ao CSS
                }).catch(err => {
                    if (botoes) botoes.style.display = 'block';
                    reject(err);
                });
              });
            }

            function extrairNumeroAgendamento(nomeCard) {
              const texto = (nomeCard || '').toString().trim();
              return texto.replace(/^agendamento\\s*:?\\s*/i, '').trim().toLowerCase();
            }

            async function buscarCardPorRA(ra) {
              const url = 'https://api.trello.com/1/boards/' + TRELLO_CONFIG.BOARD_ID +
                '/cards?fields=name,idList&key=' + TRELLO_CONFIG.KEY + '&token=' + TRELLO_CONFIG.TOKEN;
              const resp = await fetch(url);
              if (!resp.ok) {
                throw new Error('Falha ao consultar cards do Trello');
              }
              const cards = await resp.json();
              const raNormalizado = (ra || '').toString().trim().toLowerCase();
              return cards.find(c => extrairNumeroAgendamento(c.name) === raNormalizado) || null;
            }

            async function anexarPdfNoCard(cardId, pdfBlob) {
              const url = 'https://api.trello.com/1/cards/' + cardId +
                '/attachments?key=' + TRELLO_CONFIG.KEY + '&token=' + TRELLO_CONFIG.TOKEN;
              const nomeArquivo = gerarNomeArquivoPdf();
              const formData = new FormData();
              formData.append('file', pdfBlob, nomeArquivo);
              formData.append('name', nomeArquivo);
              const resp = await fetch(url, { method: 'POST', body: formData });
              if (!resp.ok) {
                throw new Error('Falha ao anexar PDF no Trello');
              }
              return resp.json();
            }

            async function salvarETrello() {
              const btnSalvar = document.querySelector('.save-btn');
              btnSalvar.disabled = true;

              btnSalvar.textContent = 'Salvando na planilha...';
              try {
                await salvarNaPlanilha();
              } catch (err) {
                console.error(err);
                alert('Falha ao salvar na planilha: ' + err.message);
                btnSalvar.disabled = false;
                btnSalvar.textContent = 'Salvar Dados';
                return;
              }

              btnSalvar.textContent = 'Gerando PDF...';
              let pdfBlob;
              try {
                pdfBlob = await gerarPdfBlob();
              } catch (err) {
                console.error(err);
                alert('Dados salvos na planilha, mas houve falha ao gerar o PDF: ' + err.message);
                btnSalvar.disabled = false;
                btnSalvar.textContent = 'Salvar Dados';
                return;
              }

              btnSalvar.textContent = 'Buscando card no Trello...';
              try {
                const card = await buscarCardPorRA(laudoDataParaEnvio.ra);
                if (!card) {
                  alert('Dados salvos e PDF gerado, mas nenhum card do Trello foi encontrado com o nome "' +
                    laudoDataParaEnvio.ra + '". Anexe o PDF manualmente.');
                  btnSalvar.textContent = 'Salvo (sem Trello)';
                } else {
                  btnSalvar.textContent = 'Anexando no Trello...';
                  await anexarPdfNoCard(card.id, pdfBlob);
                  alert('Dados salvos, PDF gerado e anexado com sucesso no card do Trello!');
                  btnSalvar.textContent = 'Salvo com Sucesso!';
                }
              } catch (err) {
                console.error(err);
                alert('Dados salvos e PDF gerado, mas houve falha ao anexar no Trello: ' + err.message);
                btnSalvar.textContent = 'Salvo (falha no Trello)';
              }

              btnSalvar.disabled = false;
            }
          <\/script>
        </body>
        </html>
    `);
    novaJanela.document.close();
}
</script>

<script>
(function melhoriasVisuaisLaudo() {
  function iniciar() {
    const botao = document.getElementById("btnGerarLaudo");
    function campoTemValor(id) { const campo = document.getElementById(id); return campo && String(campo.value || "").trim() !== ""; }
    function equipamentoValido() { const nome = document.getElementById("nomeMaquina"); return nome && String(nome.value || "").trim() !== "" && !String(nome.value || "").includes("não localizado"); }

    function formularioCompleto() {
      const camposObrigatorios = ["cliente", "ra", "codigoMaquina", "dataEntrada", "horaEntrada", "garantia", "defeitoRelatado", "obsTecnicas"];
      const camposOk = camposObrigatorios.every(campoTemValor);
      const servico = document.getElementById("selecaoServico");
      const servicoOk = servico && !servico.disabled && String(servico.value || "").trim() !== "";
      const fotosOk = typeof imagensParaLaudo !== "undefined" && imagensParaLaudo.length > 0;
      const pecasBox = document.getElementById("pecasBox");
      const pecasVisiveis = pecasBox && !pecasBox.classList.contains("hidden");
      const pecasOk = !pecasVisiveis || document.querySelectorAll('#pecasLista input[type="checkbox"]:checked').length > 0;
      return camposOk && equipamentoValido() && servicoOk && fotosOk && pecasOk;
    }

    function atualizarBotao() {
      if (!botao) return; const completo = formularioCompleto();
      botao.classList.toggle("btn-disabled", !completo); botao.setAttribute("aria-disabled", completo ? "false" : "true");
      botao.title = completo ? "Gerar laudo técnico" : "Preencha todos os campos obrigatórios para finalizar";
    }

    if (botao) {
      const gerarOriginal = window.gerarLaudo;
      if (typeof gerarOriginal === "function") { window.gerarLaudo = function() { atualizarBotao(); if (!formularioCompleto()) { alert("Preencha todos os campos obrigatórios antes de finalizar o laudo."); return; } return gerarOriginal.apply(this, arguments); }; }
      document.addEventListener("input", atualizarBotao, true); document.addEventListener("change", function() { setTimeout(atualizarBotao, 40); }, true);
      document.addEventListener("click", function(event) { if (event.target.closest("#pecasLista") || event.target.closest(".input-acessorio-dinamico") || event.target.closest(".input-extra-dinamico")) { setTimeout(atualizarBotao, 40); } }, true);
      let tentativas = 0; const timer = setInterval(function() { atualizarBotao(); tentativas++; if (tentativas > 80) clearInterval(timer); }, 250);
      atualizarBotao();
    }

    const lightbox = document.getElementById("imageLightbox"); const lightboxImg = document.getElementById("imageLightboxImg"); const lightboxTitle = document.getElementById("imageLightboxTitle"); const closeBtn = document.getElementById("imageLightboxClose");
    function abrirImagem(img) { if (!lightbox || !lightboxImg || !lightboxTitle) return; lightboxImg.src = img.src; lightboxImg.alt = img.alt || "Imagem do componente"; lightboxTitle.textContent = img.alt || "Imagem do componente"; lightbox.classList.add("show"); lightbox.setAttribute("aria-hidden", "false"); document.body.style.overflow = "hidden"; }
    function fecharImagem() { if (!lightbox || !lightboxImg) return; lightbox.classList.remove("show"); lightbox.setAttribute("aria-hidden", "true"); lightboxImg.src = ""; document.body.style.overflow = ""; }
    document.addEventListener("click", function(event) { const img = event.target.closest(".peca-img"); if (img) { event.preventDefault(); event.stopPropagation(); abrirImagem(img); return; } if (event.target === lightbox) { fecharImagem(); } }, true);
    if (closeBtn) { closeBtn.addEventListener("click", fecharImagem); }
    document.addEventListener("keydown", function(event) { if (event.key === "Escape" && lightbox && lightbox.classList.contains("show")) { fecharImagem(); } });
  }
  if (document.readyState === "loading") { document.addEventListener("DOMContentLoaded", iniciar); } else { iniciar(); }
})();
</script>

<script>
(function ativarAlternanciaDeTema() {
  function iniciar() {
    const btn = document.getElementById("themeToggleBtn"); if (!btn) return;
    const icon = btn.querySelector(".theme-icon"); const label = btn.querySelector(".theme-label");
    function aplicarTema(tema) { const modoClaro = tema === "light"; document.body.classList.toggle("light-mode", modoClaro); if (icon) icon.textContent = modoClaro ? "🌙" : "☀️"; if (label) label.textContent = modoClaro ? "Modo noturno" : "Modo claro"; localStorage.setItem("temaGeradorRelatorio", modoClaro ? "light" : "dark"); }
    aplicarTema(localStorage.getItem("temaGeradorRelatorio") || "dark");
    btn.addEventListener("click", function() { aplicarTema(document.body.classList.contains("light-mode") ? "dark" : "light"); });
  }
  if (document.readyState === "loading") { document.addEventListener("DOMContentLoaded", iniciar); } else { iniciar(); }
})();

(function corrigirToqueCheckboxMobile() {
